<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}潮汐船坞修船排程系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 60px; }
        .nav-link.active { font-weight: bold; }
        .form-error { color: #dc3545; font-size: 0.875em; margin-top: 0.25em; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">潮汐船坞排程系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/ships">船只管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/docks">船坞管理</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tides">潮汐表</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tasks">修船任务</a></li>
                    <li class="nav-item"><a class="nav-link" href="/schedules">排程甘特图</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
