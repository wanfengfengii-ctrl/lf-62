{% extends "base.html" %}
{% block title %}维修报价审批{% endblock %}
{% block extra_css %}
<style>
.status-draft { background: #6c757d; }
.status-pending_approval { background: #ffc107; color: #000; }
.status-approved { background: #0dcaf0; color: #000; }
.status-rejected { background: #dc3545; }
.status-confirmed { background: #198754; }
.status-cancelled { background: #212529; }
.timeline-step { border-left: 2px solid #dee2e6; position: relative; padding-left: 20px; padding-bottom: 16px; }
.timeline-step:last-child { border-left-color: transparent; }
.timeline-step::before {
    content: ''; position: absolute; left: -7px; top: 2px; width: 12px; height: 12px;
    border-radius: 50%; background: #0d6efd; border: 2px solid #fff; box-shadow: 0 0 0 2px #0d6efd;
}
.quotation-card { transition: all .2s; }
.quotation-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
</style>
{% endblock %}
{% block content %}
<h2>维修报价审批</h2>
<div class="alert alert-info">
    <strong>说明：</strong>根据船只维修成本自动生成报价单，支持版本管理、审批流转（提交→审批/驳回/退回→确认）、审批意见记录。报价对比可查看同一船只不同版本的报价差异。
</div>

<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span>报价单列表</span>
        <div>
            <select class="form-select form-select-sm d-inline-block" style="width:auto;" id="filterShip">
                <option value="">全部船只</option>
            </select>
            <select class="form-select form-select-sm d-inline-block ms-1" style="width:auto;" id="filterStatus">
                <option value="">全部状态</option>
                <option value="draft">草稿</option>
                <option value="pending_approval">待审批</option>
                <option value="approved">已审批</option>
                <option value="rejected">已驳回</option>
                <option value="confirmed">已确认</option>
                <option value="cancelled">已取消</option>
            </select>
            <button class="btn btn-sm btn-outline-secondary ms-1" onclick="loadQuotations()">刷新</button>
            <button class="btn btn-sm btn-primary ms-1" onclick="showCreateModal()">+ 新建报价</button>
        </div>
    </div>
    <div class="card-body">
        <div class="row" id="quotationsRow"></div>
    </div>
</div>

<div class="card mb-4">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span>报价对比</span>
        <select class="form-select form-select-sm d-inline-block" style="width:auto;" id="compareShip" onchange="loadCompare()">
            <option value="">选择船只</option>
        </select>
    </div>
    <div class="card-body" id="compareResult">
        <p class="text-muted text-center">请选择船只查看报价对比</p>
    </div>
</div>

<div class="modal fade" id="createModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">新建报价单</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <form id="createForm" class="row g-2">
                    <div class="col-12">
                        <label class="form-label">选择船只 *</label>
                        <select class="form-select" id="cqShip" required></select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">关联排程（可选）</label>
                        <select class="form-select" id="cqSchedule">
                            <option value="">不关联</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">报价单标题 *</label>
                        <input type="text" class="form-control" id="cqTitle" required placeholder="如：XX号维修报价">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">客户名称</label>
                        <input type="text" class="form-control" id="cqCustomer">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">有效期至</label>
                        <input type="date" class="form-control" id="cqValid">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">利润率 (默认20%)</label>
                        <input type="number" step="0.01" min="0" max="1" class="form-control" id="cqMargin" value="0.2">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">税率 (默认13%)</label>
                        <input type="number" step="0.01" min="0" max="1" class="form-control" id="cqTax" value="0.13">
                    </div>
                    <div class="col-12">
                        <label class="form-label">备注</label>
                        <textarea class="form-control" id="cqRemark" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button class="btn btn-primary" onclick="submitCreate()">创建</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailTitle">报价详情</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>
</div>

{% endblock %}
{% block extra_js %}
<script>
const API = '/api/costs';
const SHIP_API = '/api/ships';
const SCHEDULE_API = '/api/schedules';
let shipMap = {};
const statusLabels = {
    draft: '草稿', pending_approval: '待审批', approved: '已审批',
    rejected: '已驳回', confirmed: '已确认', cancelled: '已取消'
};
const actionLabels = {
    submit: '提交审批', approve: '审批通过', reject: '驳回', return: '退回修改'
};

function formatMoney(n) {
    return '¥' + (parseFloat(n) || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

async function loadShips() {
    const res = await fetch(SHIP_API);
    const list = await res.json();
    shipMap = {};
    const opts = '<option value="">全部船只</option>';
    const opts2 = '<option value="">选择船只</option>';
    const opts3 = '<option value="">选择船只</option>';
    list.forEach(s => {
        shipMap[s.id] = s;
        opts += `<option value="${s.id}">${s.code} ${s.name}</option>`;
        opts2 += `<option value="${s.id}">${s.code} ${s.name}</option>`;
        opts3 += `<option value="${s.id}">${s.code} ${s.name}</option>`;
    });
    document.getElementById('filterShip').innerHTML = opts;
    document.getElementById('compareShip').innerHTML = opts2;
    document.getElementById('cqShip').innerHTML = opts3;
    document.getElementById('filterShip').addEventListener('change', loadQuotations);
    document.getElementById('filterStatus').addEventListener('change', loadQuotations);
    document.getElementById('cqShip').addEventListener('change', async e => {
        const sid = e.target.value;
        const sel = document.getElementById('cqSchedule');
        sel.innerHTML = '<option value="">不关联</option>';
        if (sid) {
            const r = await fetch(`${SCHEDULE_API}?ship_id=${sid}`);
            const list = await r.json();
            list.forEach(s => {
                sel.innerHTML += `<option value="${s.id}">${s.dock_code} ${s.enter_time.substr(0,10)} ~ ${s.exit_time.substr(0,10)}</option>`;
            });
        }
    });
}

async function loadQuotations() {
    const sid = document.getElementById('filterShip').value;
    const st = document.getElementById('filterStatus').value;
    let url = `${API}/quotations`;
    const params = [];
    if (sid) params.push(`ship_id=${sid}`);
    if (st) params.push(`status=${st}`);
    if (params.length) url += '?' + params.join('&');
    const res = await fetch(url);
    const list = await res.json();
    const row = document.getElementById('quotationsRow');
    if (!list.length) {
        row.innerHTML = '<div class="col-12 text-center text-muted py-3">暂无报价单</div>';
        return;
    }
    row.innerHTML = list.map(q => `
        <div class="col-md-6 col-lg-4 mb-3">
            <div class="card quotation-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h6 class="mb-1">${q.title}</h6>
                            <div><code>${q.quotation_no}</code> <small class="text-muted">v${q.version}</small></div>
                        </div>
                        <span class="badge status-${q.status}">${statusLabels[q.status]}</span>
                    </div>
                    <div class="small text-muted mb-2">${q.ship_code} ${q.ship_name}</div>
                    <div class="row text-center mb-2">
                        <div class="col-4"><small class="text-muted">成本</small><div>${formatMoney(q.total_cost)}</div></div>
                        <div class="col-4"><small class="text-muted">利润</small><div>${formatMoney(q.profit_amount)}</div></div>
                        <div class="col-4"><small class="text-muted">报价总额</small><div class="text-primary fw-bold">${formatMoney(q.total_amount)}</div></div>
                    </div>
                    <div class="small text-muted mb-2">创建：${q.created_at.substr(0,16)}</div>
                    <div class="d-flex gap-1">
                        <button class="btn btn-sm btn-outline-primary flex-grow-1" onclick="showDetail(${q.id})">详情</button>
                    </div>
                </div>
            </div>
        </div>
    `).join('');
}

async function loadCompare() {
    const sid = document.getElementById('compareShip').value;
    const div = document.getElementById('compareResult');
    if (!sid) {
        div.innerHTML = '<p class="text-muted text-center">请选择船只查看报价对比</p>';
        return;
    }
    const res = await fetch(`${API}/compare/${sid}`);
    const data = await res.json();
    if (!data.quotations.length) {
        div.innerHTML = '<p class="text-muted text-center">该船只暂无报价单</p>';
        return;
    }
    div.innerHTML = `
        <table class="table table-sm">
            <thead>
                <tr>
                    <th>报价单号</th><th>版本</th><th>状态</th><th>标题</th>
                    <th class="text-end">成本</th><th class="text-end">利润</th><th class="text-end">税额</th><th class="text-end">总额</th>
                    <th>创建时间</th>
                </tr>
            </thead>
            <tbody>
                ${data.quotations.map(q => `
                    <tr>
                        <td><code>${q.quotation_no}</code></td>
                        <td>v${q.version}</td>
                        <td><span class="badge status-${q.status}">${statusLabels[q.status]}</span></td>
                        <td>${q.title}</td>
                        <td class="text-end">${formatMoney(q.total_cost)}</td>
                        <td class="text-end">${formatMoney(q.profit_amount)}</td>
                        <td class="text-end">${formatMoney(q.tax_amount)}</td>
                        <td class="text-end fw-bold">${formatMoney(q.total_amount)}</td>
                        <td>${q.created_at.substr(0,16)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
    `;
}

function showCreateModal() {
    document.getElementById('createForm').reset();
    document.getElementById('cqMargin').value = '0.2';
    document.getElementById('cqTax').value = '0.13';
    const d = new Date();
    d.setDate(d.getDate() + 30);
    document.getElementById('cqValid').valueAsDate = d;
    new bootstrap.Modal(document.getElementById('createModal')).show();
}

async function submitCreate() {
    const ship_id = parseInt(document.getElementById('cqShip').value);
    if (!ship_id) { alert('请选择船只'); return; }
    const title = document.getElementById('cqTitle').value.trim();
    if (!title) { alert('请填写标题'); return; }
    const schedule_id_val = document.getElementById('cqSchedule').value;
    const body = {
        ship_id,
        schedule_id: schedule_id_val ? parseInt(schedule_id_val) : null,
        title,
        customer_name: document.getElementById('cqCustomer').value.trim() || null,
        valid_until: document.getElementById('cqValid').value || null,
        profit_margin: parseFloat(document.getElementById('cqMargin').value) || 0.2,
        tax_rate: parseFloat(document.getElementById('cqTax').value) || 0.13,
        remark: document.getElementById('cqRemark').value.trim() || null,
        items: []
    };
    const res = await fetch(`${API}/quotations`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
        loadQuotations();
        loadCompare();
    } else {
        const err = await res.json();
        alert(err.detail || '创建失败');
    }
}

async function showDetail(id) {
    const res = await fetch(`${API}/quotations/${id}`);
    if (!res.ok) return;
    const q = await res.json();
    document.getElementById('detailTitle').textContent = `${q.title} (${q.quotation_no} v${q.version})`;
    const typeLabels = {material: '物料', labor: '人工', dock: '船坞', other: '其他'};
    const grouped = {};
    q.items.forEach(it => {
        if (!grouped[it.item_type]) grouped[it.item_type] = [];
        grouped[it.item_type].push(it);
    });
    let itemsHtml = '';
    for (const type of ['material', 'labor', 'dock', 'other']) {
        const items = grouped[type] || [];
        if (!items.length) continue;
        itemsHtml += `
            <h6 class="mt-3">${typeLabels[type]}</h6>
            <table class="table table-sm">
                <thead><tr><th>名称</th><th>类别</th><th>工序</th><th class="text-end">数量</th><th>单位</th><th class="text-end">单价</th><th class="text-end">小计</th></tr></thead>
                <tbody>
                    ${items.map(i => `
                        <tr>
                            <td>${i.item_name}${i.item_code ? ' <code>'+i.item_code+'</code>' : ''}</td>
                            <td>${i.category || '-'}</td>
                            <td>${i.process_type ? '<span class="badge bg-primary">'+i.process_type+'</span>' : '-'}</td>
                            <td class="text-end">${i.quantity}</td>
                            <td>${i.unit || '-'}</td>
                            <td class="text-end">${formatMoney(i.unit_price)}</td>
                            <td class="text-end">${formatMoney(i.total_price)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
    }
    let approvalsHtml = '';
    if (q.approvals.length) {
        approvalsHtml = `
            <h6 class="mt-4">审批流转</h6>
            <div class="mt-2">
                ${q.approvals.map(a => `
                    <div class="timeline-step">
                        <div class="d-flex justify-content-between">
                            <strong>${a.approver}</strong>
                            <span class="badge bg-info">${actionLabels[a.action]}</span>
                        </div>
                        <small class="text-muted">${a.approval_time.substr(0,16)} · ${statusLabels[a.previous_status] || '-'} → ${statusLabels[a.new_status] || '-'}</small>
                        ${a.comment ? `<div class="mt-1 p-2 bg-light rounded"><small>${a.comment}</small></div>` : ''}
                    </div>
                `).join('')}
            </div>
        `;
    }
    document.getElementById('detailBody').innerHTML = `
        <div class="row mb-3">
            <div class="col-md-6">
                <p class="mb-1"><strong>船只：</strong>${q.ship_code} ${q.ship_name}</p>
                <p class="mb-1"><strong>客户：</strong>${q.customer_name || '-'}</p>
                <p class="mb-1"><strong>有效期：</strong>${q.valid_until || '-'}</p>
                <p class="mb-1"><strong>状态：</strong><span class="badge status-${q.status}">${statusLabels[q.status]}</span></p>
                ${q.remark ? `<p class="mb-1"><strong>备注：</strong>${q.remark}</p>` : ''}
            </div>
            <div class="col-md-6">
                <div class="row text-center">
                    <div class="col-6 mb-2"><div class="card"><div class="card-body py-2"><small class="text-muted">总成本</small><h5 class="mb-0">${formatMoney(q.total_cost)}</h5></div></div></div>
                    <div class="col-6 mb-2"><div class="card"><div class="card-body py-2"><small class="text-muted">利润(${Math.round(q.profit_margin*100)}%)</small><h5 class="mb-0">${formatMoney(q.profit_amount)}</h5></div></div></div>
                    <div class="col-6 mb-2"><div class="card"><div class="card-body py-2"><small class="text-muted">税额(${Math.round(q.tax_rate*100)}%)</small><h5 class="mb-0">${formatMoney(q.tax_amount)}</h5></div></div></div>
                    <div class="col-6 mb-2"><div class="card bg-primary text-white"><div class="card-body py-2"><small>报价总额</small><h4 class="mb-0">${formatMoney(q.total_amount)}</h4></div></div></div>
                </div>
            </div>
        </div>
        <h6>报价明细</h6>
        ${itemsHtml || '<p class="text-muted">无明细</p>'}
        ${approvalsHtml}
        ${q.status === 'draft' || q.status === 'rejected' ? `
            <div class="mt-3 p-3 bg-light rounded">
                <h6>提交审批</h6>
                <div class="row g-2">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="apprApprover" placeholder="审批人姓名"></div>
                    <div class="col-md-6"><input type="text" class="form-control form-control-sm" id="apprComment" placeholder="审批意见(可选)"></div>
                    <div class="col-md-4">
                        <button class="btn btn-sm btn-warning" onclick="doAction(${q.id}, 'submit')">提交审批</button>
                        <button class="btn btn-sm btn-outline-secondary ms-1" onclick="newVersion(${q.id})">创建新版本</button>
                    </div>
                </div>
            </div>
        ` : ''}
        ${q.status === 'pending_approval' ? `
            <div class="mt-3 p-3 bg-light rounded">
                <h6>审批操作</h6>
                <div class="row g-2">
                    <div class="col-md-4"><input type="text" class="form-control form-control-sm" id="apprApprover" placeholder="审批人姓名" value="${q.current_approver || ''}"></div>
                    <div class="col-md-8"><input type="text" class="form-control form-control-sm" id="apprComment" placeholder="审批意见(可选)"></div>
                </div>
                <div class="mt-2">
                    <button class="btn btn-sm btn-success me-1" onclick="doAction(${q.id}, 'approve')">通过</button>
                    <button class="btn btn-sm btn-danger me-1" onclick="doAction(${q.id}, 'reject')">驳回</button>
                    <button class="btn btn-sm btn-warning me-1" onclick="doAction(${q.id}, 'return')">退回修改</button>
                </div>
            </div>
        ` : ''}
    `;

    let footerBtns = '';
    if (q.status === 'approved') {
        footerBtns = `<button class="btn btn-success" onclick="confirmQ(${q.id})">最终确认</button>`;
    }
    if (q.status !== 'confirmed' && q.status !== 'cancelled' && q.status !== 'approved') {
        footerBtns += `<button class="btn btn-outline-secondary" onclick="cancelQ(${q.id})">取消报价</button>`;
    }
    if (q.status === 'draft' || q.status === 'rejected') {
        footerBtns = `<button class="btn btn-outline-primary me-2" onclick="showEdit(${q.id})">编辑</button>` + footerBtns;
    }
    if (q.status !== 'approved' && q.status !== 'confirmed') {
        footerBtns += `<button class="btn btn-outline-danger ms-2" onclick="deleteQ(${q.id})">删除</button>`;
    }
    document.getElementById('detailFooter').innerHTML = footerBtns + '<button class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>';
    new bootstrap.Modal(document.getElementById('detailModal')).show();
}

async function doAction(id, action) {
    const approver = document.getElementById('apprApprover').value.trim();
    if (!approver) { alert('请填写审批人'); return; }
    const comment = document.getElementById('apprComment').value.trim() || null;
    const res = await fetch(`${API}/quotations/${id}/approval`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({approver, action, comment})
    });
    if (res.ok) {
        showDetail(id);
        loadQuotations();
        loadCompare();
    } else {
        const err = await res.json();
        alert(err.detail || '操作失败');
    }
}

async function confirmQ(id) {
    if (!confirm('确定最终确认该报价单？确认后无法修改。')) return;
    const res = await fetch(`${API}/quotations/${id}/confirm`, {method: 'POST'});
    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
        loadQuotations();
        loadCompare();
    }
}

async function cancelQ(id) {
    if (!confirm('确定取消该报价单？')) return;
    const res = await fetch(`${API}/quotations/${id}/cancel`, {method: 'POST'});
    if (res.ok) {
        showDetail(id);
        loadQuotations();
        loadCompare();
    }
}

async function deleteQ(id) {
    if (!confirm('确定删除该报价单？')) return;
    const res = await fetch(`${API}/quotations/${id}`, {method: 'DELETE'});
    if (res.ok) {
        bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
        loadQuotations();
        loadCompare();
    } else {
        const err = await res.json();
        alert(err.detail || '删除失败');
    }
}

async function newVersion(id) {
    if (!confirm('基于当前版本创建新报价单？')) return;
    const res = await fetch(`${API}/quotations/${id}/new-version`, {method: 'POST'});
    if (res.ok) {
        const q = await res.json();
        bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide();
        showDetail(q.id);
        loadQuotations();
        loadCompare();
    }
}

async function showEdit(id) {
    const title = prompt('修改报价单标题：', '');
    if (title === null) return;
    const margin = prompt('利润率(0~1，如0.2表示20%)：', '0.2');
    if (margin === null) return;
    const body = {};
    if (title.trim()) body.title = title.trim();
    const m = parseFloat(margin);
    if (!isNaN(m) && m >= 0 && m <= 1) body.profit_margin = m;
    const res = await fetch(`${API}/quotations/${id}`, {
        method: 'PUT', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
    });
    if (res.ok) {
        showDetail(id);
        loadQuotations();
        loadCompare();
    } else {
        const err = await res.json();
        alert(err.detail || '修改失败');
    }
}

(async function init() {
    await loadShips();
    loadQuotations();
})();
</script>
{% endblock %}
